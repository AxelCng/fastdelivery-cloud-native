# ─── Configuración de Nginx para el Frontend de FastDelivery ─────
# Implementa: Hosting SPA, Proxy reverso al API Gateway, GZIP, Caché
# ──────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  localhost;

    # Directorio raíz con los archivos estáticos del frontend
    root   /usr/share/nginx/html;
    index  index.html;

    # ─── Compresión GZIP ─────────────────────────────────────────
    # Reduce el tamaño de transferencia de archivos estáticos
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Caché de Recursos Estáticos ─────────────────────────────
    # Archivos CSS, JS e imágenes se cachean por 7 días
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Proxy Reverso hacia el API Gateway ──────────────────────
    # Todas las peticiones /api/* se reenvían al api-gateway
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # ─── Health Check del API Gateway ────────────────────────────
    location /health {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ─── Manejo de Rutas SPA ─────────────────────────────────────
    # Cualquier ruta que no sea archivo ni /api se redirige a index.html
    # Esto permite que la SPA maneje el enrutamiento del lado del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Páginas de Error Personalizadas ─────────────────────────
    error_page 500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
