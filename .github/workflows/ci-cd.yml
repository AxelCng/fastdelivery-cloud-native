name: CI/CD - FastDelivery Cloud Native

# Pipeline conceptual: se dispara en cada push/PR a main.
# Cubre las 5 fases pedidas en el Caso Práctico 9: Build, Test, Docker Build, Docker Push, Deployment.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  DOCKER_NAMESPACE: fastdelivery-peru

jobs:
  # ---------------------------------------------------------
  # 1. BUILD & TEST — se ejecuta en matriz para los 4 componentes
  # ---------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - frontend
          - api-gateway
          - services/products-service
          - services/inventory-service
          - services/orders-service

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Instalar dependencias
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Ejecutar linter
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Ejecutar pruebas
        working-directory: ${{ matrix.service }}
        run: npm test --if-present

  # ---------------------------------------------------------
  # 2. DOCKER BUILD & PUSH — solo en push a main, tras pasar los tests
  # ---------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push (${{ matrix.service }})
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: frontend
            image: fastdelivery-frontend
          - service: api-gateway
            image: fastdelivery-api-gateway
          - service: services/products-service
            image: fastdelivery-products-service
          - service: services/inventory-service
            image: fastdelivery-inventory-service
          - service: services/orders-service
            image: fastdelivery-orders-service

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}

  # ---------------------------------------------------------
  # 3. DEPLOYMENT — paso conceptual (no se implementa Kubernetes real,
  #    solo se documenta el paso de despliegue tal como pide el caso práctico)
  # ---------------------------------------------------------
  deploy:
    name: Deployment (conceptual)
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Simular despliegue a Kubernetes
        run: |
          echo "Aquí iría 'kubectl apply -f k8s/' contra el clúster de staging/producción."
          echo "Diseño de despliegue documentado en /k8s y /docs/arquitectura.md"
