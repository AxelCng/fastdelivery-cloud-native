# ═══════════════════════════════════════════════════════════════════
# Frontend — Deployment + Service + Ingress
# Aplicación web servida por Nginx (puerto 80)
# Punto de entrada público para los usuarios finales
# ═══════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fastdelivery
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: fastdelivery-peru/frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fastdelivery
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP

---
# ─── Ingress (punto de entrada público) ────────────────────────
# Expone el frontend al exterior del clúster
# Requiere un Ingress Controller instalado (ej: nginx-ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastdelivery-ingress
  namespace: fastdelivery
  labels:
    app: fastdelivery
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: fastdelivery.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
