# ═══════════════════════════════════════════════════════════════════
# Inventory Service — Deployment + Service + MongoDB
# Microservicio de Inventario (puerto 3002)
# ═══════════════════════════════════════════════════════════════════

# ─── MongoDB para Inventory ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-db
  namespace: fastdelivery
  labels:
    app: inventory-db
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
        tier: database
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: inventory-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: inventory-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-db
  namespace: fastdelivery
  labels:
    app: inventory-db
spec:
  selector:
    app: inventory-db
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  type: ClusterIP

---
# ─── Inventory Service (API) ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: fastdelivery
  labels:
    app: inventory-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        tier: backend
    spec:
      containers:
        - name: inventory-service
          image: fastdelivery-peru/inventory-service:latest
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: PORT
              value: "3002"
            - name: DB_HOST
              value: "inventory-db"
            - name: DB_PORT
              value: "27017"
            - name: DB_NAME
              value: "inventory_db"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: fastdelivery
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
  type: ClusterIP
