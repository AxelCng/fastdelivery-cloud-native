# ═══════════════════════════════════════════════════════════════════
# API Gateway — Deployment + Service
# Puerta de enlace que enruta peticiones a los microservicios (puerto 8080)
# ═══════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fastdelivery
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      containers:
        - name: api-gateway
          image: fastdelivery-peru/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            # Las URLs internas usan los nombres de los Services de K8s
            - name: PRODUCTS_URL
              value: "http://products-service:3001"
            - name: INVENTORY_URL
              value: "http://inventory-service:3002"
            - name: ORDERS_URL
              value: "http://orders-service:3003"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fastdelivery
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
